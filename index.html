    document.addEventListener('DOMContentLoaded', () => {
      const otpInput = document.getElementById('P9999_OTP_NUMBER');

      let otpData = null; // Will store {otp: '123456', timestamp: Date.now()}
      const OTP_EXPIRY_TIME = 5 * 60 * 1000; // 5 minutes in milliseconds

      otpInput.hide();
      // OTP Validation Function
      function validateOTP(enteredOtp, mobile) {
        // Check if OTP data exists
        if (!otpData) {
          return { valid: false, message: "Please request an OTP first." };
        }

        // Check if OTP is for the same mobile number
        if (otpData.mobile !== mobile) {
          return { valid: false, message: "Mobile number mismatch. Please request OTP again." };
        }

        // Check if OTP is expired
        const currentTime = Date.now();
        const timeDifference = currentTime - otpData.timestamp;

        if (timeDifference > OTP_EXPIRY_TIME) {
          otpData = null; // Clear expired OTP
          return { valid: false, message: "OTP has expired. Please request a new one." };
        }

        // Validate OTP value
        if (enteredOtp !== otpData.otp) {
          return { valid: false, message: "Invalid OTP. Please try again." };
        }

        return { valid: true, message: "OTP verified successfully!" };
      }

      // OTP Expiry Timer Functions
      let otpTimer = null;

      function startOtpExpiryTimer() {
        clearOtpExpiryTimer();

        // Update timer every second
        otpTimer = setInterval(() => {
          if (!otpData) return;

          const currentTime = Date.now();
          const timeDifference = currentTime - otpData.timestamp;
          const timeLeft = OTP_EXPIRY_TIME - timeDifference;

          if (timeLeft <= 0) {
            clearOtpExpiryTimer();
            showWarningToast("OTP has expired. Please request a new one.");
            otpData = null;
          }
        }, 1000);

      function clearOtpExpiryTimer() {

              showSuccessToast("New OTP sent successfully!");
              startOtpExpiryTimer();
            }
          });
        }
      }

      // Add resend OTP button dynamically
      function addResendOtpButton() {
        if (!document.getElementById('resendOtp')) {
          const resendButton = document.createElement('button');
          resendButton.id = 'resendOtp';
          resendButton.textContent = 'Resend OTP';
          resendButton.style.display = 'none';
          resendButton.style.marginTop = '10px';
          resendButton.classList.add('btn', 'btn-secondary', 'btn-sm');

          resendButton.addEventListener('click', (e) => {
            e.preventDefault();
            resendOTP();
          });

          const container = document.querySelector('#P9999_OTP_NUMBER_CONTAINER');
          if (container) {
            container.appendChild(resendButton);
          }

          setTimeout(() => {
            if (otpData && resendButton) {
              resendButton.style.display = 'block';
            }
          }, 30000);
        }
      }
    });
  </script>


  <script>
    // Prevent navigating back into logged-in pages
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
      window.history.go(1);
    };

  </script>

      if ($('#P1_NAME_OF_THE_INDENTING_OFFICER_DISPLAY').length) {
        $('#P1_NAME_OF_THE_INDENTING_OFFICER_DISPLAY').text(username);
      }
      if ($('#P1_NAME_OF_THE_INDENTING_OFFICER').length) {
        $('#P1_NAME_OF_THE_INDENTING_OFFICER').val(username);
      }
      if ($('#P1_DISTRICT_DISPLAY').length) {
        $('#P1_DISTRICT_DISPLAY').text(district);
      }
      if ($('#P1_DISTRICT').length) {
        $('#P1_DISTRICT').val(district);
      }

      function fetchAndPopulateDropdown({ payload, dropdownId, placeholder }) {
        $.ajax({
          url: apiUrl,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(payload)
          },
          dataType: 'json',
          success(response) {
            const decrypted = decryptData(response.data);
            const $dropdown = $(`#${dropdownId}`);
            $dropdown.empty().append(`<option value="">${placeholder}</option>`);

            if (Array.isArray(decrypted)) {
              decrypted.forEach(item => {
                const value = item.district || item.d || item.quarter || item.year || item.scheme;
                if (value) {
                  $dropdown.append(`<option value="${value}">${value}</option>`);
                }
              });
            }
          },
          error(xhr, status, error) {
            console.error(`${payload.function_name} API Error:`, error);
          }
        });
      }

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "get_factory_districts_fn",
          params: {}
        },
        dropdownId: "P60_DISTRICT",
        placeholder: "--Select District--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_quarter_fn",
          params: {}
        },
        dropdownId: "P60_QUARTERS",
        placeholder: "--Select Quarter--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_year_fn",
          params: {}
        },
        dropdownId: "P60_FINANCIAL_YEAR",
        placeholder: "--Select Financial Year--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_scheme_name_fn",
          params: {}
        },
        dropdownId: "P60_SCHEME_NAME",
        placeholder: "--Select Scheme--"
      });

      // Function to destroy existing DataTable
      function destroyDataTable() {
        if (dataTableRef) {
          try {
            dataTableRef.destroy();
          } catch (e) {
            console.warn("Error destroying DataTable:", e);
          }
          dataTableRef = null;
        }
      }

      // Function to display no data message
      function showNoDataMessage(message) {
        destroyDataTable();

        const noDataHtml = `
        <div class="no-data-container">
          <div class="no-data-icon">
            <i class="fas fa-search"></i>
          </div>
          <div class="no-data-title">No Data Found</div>
          <div class="no-data-message">${message || 'No records match your search criteria'}</div>
          <div class="no-data-suggestion">
            <i class="fas fa-lightbulb me-2"></i>
            Try adjusting your filters or selecting different values
          </div>
        </div>
      `;
        $('#pivotContainer').html(noDataHtml);
      }

      // Function to download data as Excel (all pages)
      function downloadAsExcel(data, filename) {
        // Normalize/transform data to stable Excel headers
        const excelData = (data || []).map(item => ({
          'District': item.name_of_the_district || '',
          'Medicine Name': item.medicine_name || '',
          'Packing Size': item.packing_size || '',
          'Quantity': item.quantity || '',
          'Amount (₹)': item.amount || '',
          'Total Quantity': item.total_quantity || ''
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        ws['!cols'] = [
          { wch: 20 },
          { wch: 30 },
          { wch: 15 },
          { wch: 15 },
          { wch: 20 },
          { wch: 15 }
        ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Medicine Details");

        wb.Props = {
          Title: "Medicine Indent Report",
          Subject: "Scheme Medicine Details",
          Author: "Department of Indian Medicine and Homoeopathy",
          CreatedDate: new Date()
        };

        if (!filename) {
          const date = new Date();
          const dateStr = date.toISOString().split('T')[0];
          filename = `Medicine_Indent_Scheme_${dateStr}.xlsx`;
        }

        XLSX.writeFile(wb, filename);
      }

      function getParsedResponse(response) {
        try {
          return response && response.data ? decryptData(response.data) : response;
        } catch (e) {
          console.error('Failed to decrypt response data:', e);
          return response;
        }
      }

      function getPayloadWithLimitOffset(basePayload, limit, offset) {
        return {
          ...basePayload,
          limit: Math.max(1, parseInt(limit, 10) || 1000),
          offset: Math.max(0, parseInt(offset, 10) || 0)
        };
      }

      function fetchPageData(basePayload, limit, offset) {
        const requestPayload = getPayloadWithLimitOffset(basePayload, limit, offset);
        return $.ajax({
          url: apiUrlWithLimitOffset,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(requestPayload)
          },
          dataType: 'json'
        });
      }

      function addDownloadButton() {
        if ($('#downloadExcelBtn').length === 0) {
          const downloadButtonHtml = `
            <div class="download-btn-container">
              <button class="btn-download" id="downloadExcelBtn" type="button" style="display: none;">
                <i class="bi bi-download"></i> Download Scheme Excel Report
              </button>
            </div>
          `;

          // Insert after the search/clear button row but before the table
          $('.row:has(#searchBtn)').after(downloadButtonHtml);
        }
      }

      // Create download button on page load
      addDownloadButton();

      function fetchTableData() {
        const districtFilter = $('#P60_DISTRICT').val();
        const financialYear = $('#P60_FINANCIAL_YEAR').val();
        const quarters = $('#P60_QUARTERS').val();
        const schemeName = $('#P60_SCHEME_NAME').val();

        // Check if at least one filter is selected
        if (!districtFilter && !financialYear && !quarters && !schemeName) {
          if (typeof showErrorToast === 'function') {
            showErrorToast("Please select at least one filter to search");
          } else {
            alert("Please select at least one filter to search");
          }
          return;
        }

        const payload = {
          action: "function_call",
          function_name: "get_scheme_medicine_details",
          params: {
            p_district: districtFilter || null,
            p_financial_year: financialYear || '',
            p_quarters: quarters || '',
            p_scheme_name: schemeName || '',
          }
        };

        // Save payload/count so download can export all pages
        lastBasePayload = payload;
        lastTotalCount = 0;
        currentData = null;
        $('#downloadExcelBtn').hide();

        // Destroy existing DataTable before showing loader
        destroyDataTable();

        // Show loading state
        $('#pivotContainer').html(`
        <div style="text-align: center; padding: 40px;">
          <div class="spinner-border text-primary" role="status" style="width: 2rem; height: 2rem;">
            <span class="visually-hidden">Loading...</span>
          </div>
          <p style="margin-top: 10px; color: #6c757d;">Loading data...</p>
        </div>
      `);

        $.ajax({
          url: apiUrl,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(payload)
          },
          dataType: 'json',
          success(response) {
            // Check response format
            if (response && response.success === 0) {
              // Handle no data found response
              $('#downloadExcelBtn').hide();
              showNoDataMessage(response.message || "Data not found");
              return;
            }

            // Try to decrypt data
            let parsedResponse;
            try {
              parsedResponse = decryptData(response.data);
            } catch (e) {
              console.error("Error decrypting data:", e);
              $('#downloadExcelBtn').hide();
              showNoDataMessage("Error processing response data");
              return;
            }

            const data = Array.isArray(parsedResponse)
              ? parsedResponse
              : (Array.isArray(parsedResponse?.data) ? parsedResponse.data : []);

            const totalCount = Number(
              parsedResponse?.pagination?.total ??
              parsedResponse?.total ??
              data.length
            );

            lastTotalCount = totalCount;
            currentData = data;

            // Check if data exists
            if (!data || !Array.isArray(data) || data.length === 0) {
              $('#downloadExcelBtn').hide();
              showNoDataMessage("No records found for the selected criteria");
              return;
            }

            // Define columns for DataTable
            const columns = [
              { title: "District", data: "name_of_the_district" },
              { title: "Medicine Name", data: "medicine_name" },
              { title: "Packing Size", data: "packing_size" },
              {
                title: "Quantity",
                data: "quantity",
                className: "text-right",
                render: function (data) {
                  const num = parseFloat(data);
                  return isNaN(num) ? '0' : num.toLocaleString();
                }
              },
              {
                title: "Amount (₹)",
                data: "amount",
                className: "text-right",
                render: function (data) {
                  const num = parseFloat(data);
                  return isNaN(num) ? '₹ 0' : '₹ ' + num.toLocaleString();
                }
              },
              {
                title: "Total Quantity",
                data: "total_quantity",
                className: "text-right",
                render: function (data) {
                  const num = parseFloat(data);
                  return isNaN(num) ? '0' : num.toLocaleString();
                }
              }
            ];

            // Create DataTable
            const tableHtml = `
            <table id="medicineDataTable" class="display" style="width:100%">
              <thead>
                <tr>
                  ${columns.map(col => `<th>${col.title}</th>`).join('')}
                </tr>
              </thead>
            </table>
          `;

            $('#pivotContainer').html(tableHtml);

            dataTableRef = $('#medicineDataTable').DataTable({
              data: data,
              columns: columns,
              pageLength: 10,
              lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
              searching: true,
              paging: true,
              ordering: true,
              info: true,
              responsive: true,
              scrollX: true,
              destroy: true, // Allow recreation if needed
              language: {
                paginate: {
                  previous: '<i class="fas fa-chevron-left"></i> Prev',
                  next: 'Next <i class="fas fa-chevron-right"></i>'
                },
                search: "Search:",
                searchPlaceholder: "Search...",
                emptyTable: "No data available",
                info: "Showing _START_ to _END_ of _TOTAL_ entries",
                infoEmpty: "Showing 0 to 0 of 0 entries",
                infoFiltered: "(filtered from _MAX_ total entries)",
                lengthMenu: "Show _MENU_ entries",
                loadingRecords: "Loading...",
                processing: "Processing...",
                zeroRecords: "No matching records found"
              }
            });

            // Show download when we have at least one row
            $('#downloadExcelBtn').show();
          },
          error(xhr, status, error) {
            console.error(`${payload.function_name} API Error:`, error);

            // Check if error response has the no data format
            try {
              const errorResponse = JSON.parse(xhr.responseText);
              if (errorResponse && errorResponse.success === 0) {
                showNoDataMessage(errorResponse.message || "Data not found");
                return;
              }
            } catch (e) {
              // Not JSON or different format
            }

            $('#pivotContainer').html(`
            <div class="no-data-container" style="border-color: #ffcdd2; background: #fff3f3;">
              <div class="no-data-icon" style="color: #dc3545;">
                <i class="fas fa-exclamation-triangle"></i>
              </div>
              <div class="no-data-title" style="color: #dc3545;">Error Loading Data</div>
              <div class="no-data-message">Please try again later or contact support</div>
            </div>
          `);

            // Ensure dataTableRef is null after error
            dataTableRef = null;
          }
        });
      }

      $('#searchBtn').on('click', function () {
        fetchTableData();
      });

      $('#clearBtn').on('click', function () {
        $('#P60_DISTRICT').val('');
        $('#P60_FINANCIAL_YEAR').val('');
        $('#P60_QUARTERS').val('');
        $('#P60_SCHEME_NAME').val('');

        destroyDataTable();
        $('#pivotContainer').empty();

        $('#downloadExcelBtn').hide();
        currentData = null;
        lastTotalCount = 0;
        lastBasePayload = null;
      });

      // Download button click handler
      $(document).on('click', '#downloadExcelBtn', async function () {
        if (!currentData || currentData.length === 0) {
          if (typeof showErrorToast === 'function') {
            showErrorToast("No data available to download.");
          } else {
            alert("No data available to download.");
          }
          return;
        }

        const financialYear = ($('#P60_FINANCIAL_YEAR').val() || '').replace(/\s+/g, '_') || 'All';
        const quarter = ($('#P60_QUARTERS').val() || '').replace(/\s+/g, '_') || 'All';
        const schemeName = ($('#P60_SCHEME_NAME').val() || '').replace(/\s+/g, '_') || 'All';
        const dateStr = new Date().toISOString().split('T')[0];
        const filename = `Medicine_Indent_Scheme_${financialYear}_${quarter}_${schemeName}_${dateStr}.xlsx`;

        let dataToDownload = currentData;
        const totalCount = Number(lastTotalCount) || 0;

        try {
          if (lastBasePayload && totalCount > 0 && totalCount > currentData.length) {
            const allData = [];
            const limit = 1000;

            // prevent double-click while downloading
            $('#downloadExcelBtn').prop('disabled', true).hide();

            for (let offset = 0; offset < totalCount; offset += limit) {
              const pageResp = await fetchPageData(lastBasePayload, limit, offset);
              const parsedPage = getParsedResponse(pageResp);
              const pageData = Array.isArray(parsedPage)
                ? parsedPage
                : (Array.isArray(parsedPage?.data) ? parsedPage.data : []);

              if (!pageData || pageData.length === 0) break;
              allData.push(...pageData);
            }

            if (allData.length > 0) {
              dataToDownload = allData;
            }
          }
        } catch (e) {
          console.error('Failed to download all pages:', e);
          dataToDownload = currentData; // fallback
        } finally {
          $('#downloadExcelBtn').prop('disabled', false).show();
        }

        downloadAsExcel(dataToDownload, filename);

        if (typeof showSuccessToast === 'function') {
          showSuccessToast("Report downloaded successfully!");
        }
      });
    });
  </script>
</body>

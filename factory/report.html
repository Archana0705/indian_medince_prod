  <script>
    let dataTableRef;
    let currentData = null; // Store current data for download
    let lastBasePayload = null; // Store last request payload for download
    let lastTotalCount = 0; // Store total records count for download

    $(document).ready(function () {
      let uploadFile = null;
      let uploadPayload = null;
      const apiUrl = `${BASE_API_URL}/commonfunction`;
      const apiUrlWithLimitOffset = `${BASE_API_URL}/commonfunction_with_limit_offset`;
      const district = sessionStorage.getItem('userDistrict');
      const designation = sessionStorage.getItem('userDesignation') || '';

      const username = sessionStorage.getItem('userName');
      const mobnumber = sessionStorage.getItem('userMobileNumber') || '9941256207';
      $('#P1_NAME_OF_THE_INDENTING_OFFICER_DISPLAY').text(username);
      $('#P1_NAME_OF_THE_INDENTING_OFFICER').val(username);
      $('#P1_DISTRICT_DISPLAY').text(district);
      $('#P1_DISTRICT').val(district);

      function fetchAndPopulateDropdown({ payload, dropdownId, placeholder }) {
        $.ajax({
          url: apiUrl,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(payload)
          },
          dataType: 'json',
          success(response) {
            const decrypted = decryptData(response.data);

            const $dropdown = $(`#${dropdownId}`);
            $dropdown.empty().append(`<option value="">${placeholder}</option>`);

            decrypted.forEach(item => {
              const value = item.district || item.d || item.quarter || item.year;
              $dropdown.append(`<option value="${value}">${value}</option>`);
            });
          },
          error(xhr, status, error) {
            console.error(`${payload.function_name} API Error:`, error);
          }
        });
      }

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "get_factory_districts_fn",
          params: {}
        },
        dropdownId: "P37_DISTRICT",
        placeholder: "--Select District--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_year_fn",
          params: {}
        },
        dropdownId: "P37_FINANCIAL_YEAR",
        placeholder: "--Select Financial Year--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_quarter_fn",
          params: {}
        },
        dropdownId: "P37_QUARTERS",
        placeholder: "--Select Quarters Name--"
      });

      // Function to download data as Excel
      function downloadAsExcel(data, filename) {
        // Create worksheet
        const ws = XLSX.utils.json_to_sheet(data, {
          header: ["name_of_the_district", "medicine_name", "packing_size", "quantity", "amount", "total_quantity"],
          skipHeader: false
        });

        // Set column widths
        const colWidths = [
          { wch: 20 }, // District
          { wch: 30 }, // Medicine Name
          { wch: 15 }, // Packing Size
          { wch: 15 }, // Quantity
          { wch: 15 }, // Amount
          { wch: 15 }  // Total Quantity
        ];
        ws['!cols'] = colWidths;

        // Create workbook
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Medicine Details");

        // Add metadata
        wb.Props = {
          Title: "Medicine Indent Report",
          Subject: "Medicine Details",
          Author: "Department of Indian Medicine and Homoeopathy",
          CreatedDate: new Date()
        };

        // Generate filename with date if not provided
        if (!filename) {
          const date = new Date();
          const dateStr = date.toISOString().split('T')[0];
          filename = `Medicine_Indent_Report_${dateStr}.xlsx`;
        }

        // Save file
        XLSX.writeFile(wb, filename);
      }

      function getParsedResponse(response) {
        try {
          return response && response.data ? decryptData(response.data) : response;
        } catch (e) {
          console.error('Failed to decrypt response data:', e);
          return response;
        }
      }

      function getPayloadWithLimitOffset(basePayload, limit, offset) {
        return {
          ...basePayload,
          limit: Math.max(1, parseInt(limit, 10) || 1000),
          offset: Math.max(0, parseInt(offset, 10) || 0)
        };
      }

      function fetchPageData(basePayload, limit, offset) {
        const requestPayload = getPayloadWithLimitOffset(basePayload, limit, offset);
        return $.ajax({
          url: apiUrlWithLimitOffset,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(requestPayload)
          },
          dataType: 'json'
        });
      }

      // Add download button to the page
      function addDownloadButton() {
        // Check if button already exists
        if ($('#downloadExcelBtn').length === 0) {
          const downloadButtonHtml = `
            <div class="download-btn-container">
              <button class="btn-download" id="downloadExcelBtn" type="button" style="display: none;">
                <i class="bi bi-download"></i> Download Report (Excel)
              </button>
            </div>
          `;

          // Insert after the search/clear buttons row but before the table
          $('.row:has(#searchBtn)').after(downloadButtonHtml);
        }
      }

      // Call addDownloadButton on page load
      addDownloadButton();

      function fetchTableData() {
        const payload = {
          action: "function_call",
          function_name: "im_get_medicine_details_fn",
          params: {
            p_district: $('#P37_DISTRICT').val() || null,
            p_financial_year: $('#P37_FINANCIAL_YEAR').val() || '',
            p_quarters: $('#P37_QUARTERS').val() || '',
          }
        };

        // Save payload/count so download can fetch all pages
        lastBasePayload = payload;
        lastTotalCount = 0;

        // Show loading state while fetching report data
        $('#pivotContainer').html(
          '<div class="text-center p-4">' +
          '<div class="spinner-border text-primary" role="status">' +
          '<span class="visually-hidden">Loading...</span>' +
          '</div>' +
          '<p class="mt-2 mb-0">Loading data...</p>' +
          '</div>'
        );
        $('#downloadExcelBtn').hide();

        $.ajax({
          url: apiUrl,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(payload)
          },
          dataType: 'json',
          success(response) {
            let parsedResponse;
            try {
              parsedResponse = response && response.data ? decryptData(response.data) : response;
            } catch (e) {
              console.error('Failed to decrypt response data:', e);
              parsedResponse = response;
            }

            const data = Array.isArray(parsedResponse)
              ? parsedResponse
              : (Array.isArray(parsedResponse?.data) ? parsedResponse.data : []);
            const responseMessage = parsedResponse?.message || response?.message || 'No Data Found';
            const successFlag = parsedResponse?.success ?? response?.success;
            const totalCount = parsedResponse?.pagination?.total ?? response?.pagination?.total;
            lastTotalCount = Number(totalCount) || 0;
            const isNoDataResponse = Number(successFlag) === 0 &&
              (
                Number(totalCount) === 0 ||
                String(responseMessage).toLowerCase().includes('not found')
              );

            // Clear previous DataTable if exists
            if (dataTableRef) {
              dataTableRef.destroy();
              dataTableRef = null;
            }

            if (isNoDataResponse || !data || data.length === 0) {
              $('#pivotContainer').html(`<div class="alert alert-info text-center">${responseMessage}</div>`);
              $('#downloadExcelBtn').hide(); // Hide download button if no data
              currentData = [];
              return;
            }

            // Store data for download
            currentData = data;

            // Show download button
            $('#downloadExcelBtn').show();

            // Define columns for DataTable
            const columns = [
              { title: "District", data: "name_of_the_district" },
              { title: "Medicine Name", data: "medicine_name" },
              { title: "Packing Size", data: "packing_size" },
              { title: "Quantity", data: "quantity" },
              { title: "Amount", data: "amount" },
              { title: "Total Quantity", data: "total_quantity" }
            ];

            // Create DataTable with full width and pagination
            dataTableRef = $('#pivotContainer').html(`
              <table id="medicineDataTable" class="display table table-striped table-bordered" style="width:100%">
                <thead>
                  <tr>
                    ${columns.map(col => `<th>${col.title}</th>`).join('')}
                  </tr>
                </thead>
              </table>
            `).find('#medicineDataTable').DataTable({
              data: data,
              columns: columns,
              pageLength: 10,
              lengthMenu: [[10, 25, 50, -1], [10, 25, 50, "All"]],
              searching: true,
              paging: true,
              ordering: true,
              info: true,
              responsive: true,
              scrollX: true,
              language: {
                paginate: {
                  previous: '< Previous',
                  next: 'Next >'
                },
                search: "Search:",
                searchPlaceholder: "Type to search..."
              },
              dom: '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"f>>' +
                '<"row"<"col-sm-12"tr>>' +
                '<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>',
              initComplete: function () {
                // Style the search input
                $('div.dataTables_filter input').addClass('form-control');
                $('div.dataTables_filter input').attr('placeholder', 'Search...');

                // Style the length menu
                $('div.dataTables_length select').addClass('form-control');
              }
            });
          },
          error(xhr, status, error) {
            console.error(`${payload.function_name} API Error:`, error);
            $('#pivotContainer').html('<div class="alert alert-danger text-center">Error loading data</div>');
            $('#downloadExcelBtn').hide(); // Hide download button on error
          }
        });
      }

      $('#searchBtn').on('click', function () {
        const financialYear = $('#P37_FINANCIAL_YEAR').val();
        const quarters = $('#P37_QUARTERS').val();

        if (!financialYear || !quarters) {
          showErrorToast("Please select both Financial Year and Quarters.");
          return;
        }
        fetchTableData();
      });

      $('#clearBtn').on('click', function () {
        $('#P37_FINANCIAL_YEAR').val('');
        $('#P37_QUARTERS').val('');
        $('#P37_DISTRICT').val('');

        // Clear DataTable
        if (dataTableRef) {
          dataTableRef.destroy();
          dataTableRef = null;
          $('#pivotContainer').empty();
        }

        // Hide download button
        $('#downloadExcelBtn').hide();

        // Clear stored data
        currentData = [];
      });

      // Download button click handler
      $(document).on('click', '#downloadExcelBtn', async function () {
        if (!currentData || currentData.length === 0) {
          showErrorToast("No data available to download.");
          return;
        }

        // Get selected financial year and quarter for filename
        const financialYear = $('#P37_FINANCIAL_YEAR').val().replace(/\s+/g, '_');
        const quarter = $('#P37_QUARTERS').val().replace(/\s+/g, '_');
        const date = new Date();
        const dateStr = date.toISOString().split('T')[0];
        const filename = `Medicine_Indent_${financialYear}_${quarter}_${dateStr}.xlsx`;

        // If API returned only first page, re-fetch all rows for full export
        let dataToDownload = currentData;
        try {
          const totalCount = Number(lastTotalCount) || 0;
          if (lastBasePayload && totalCount > 0 && totalCount > currentData.length) {
            const allData = [];
            const limit = 1000;

            // prevent double-click while downloading
            $('#downloadExcelBtn').prop('disabled', true).hide();

            for (let offset = 0; offset < totalCount; offset += limit) {
              const pageResp = await fetchPageData(lastBasePayload, limit, offset);
              const parsedPage = getParsedResponse(pageResp);
              const pageData = Array.isArray(parsedPage)
                ? parsedPage
                : (Array.isArray(parsedPage?.data) ? parsedPage.data : []);

              if (!pageData || pageData.length === 0) break;
              allData.push(...pageData);
            }

            if (allData.length > 0) {
              dataToDownload = allData;
            }
          }
        } catch (e) {
          console.error('Failed to download all pages:', e);
          // fallback to current page data
          dataToDownload = currentData;
        } finally {
          $('#downloadExcelBtn').prop('disabled', false).show();
        }

        // Download the data
        downloadAsExcel(dataToDownload, filename);

        // Show success message
        if (typeof showSuccessToast === 'function') {
          showSuccessToast("Report downloaded successfully!");
        }
      });
    });
  </script>

</body>

  <script>
    let dataTableRef;
    let currentData = null; // Store current data for download
    let lastBasePayload = null; // Store last request payload for download
    let lastTotalCount = 0; // Store total records count for download

    $(document).ready(function () {
      let uploadFile = null;
      let uploadPayload = null;
      const apiUrl = `${BASE_API_URL}/commonfunction`;
      const apiUrlWithLimitOffset = `${BASE_API_URL}/commonfunction_with_limit_offset`;
      const district = sessionStorage.getItem('userDistrict');
      const designation = sessionStorage.getItem('userDesignation') || '';

      const username = sessionStorage.getItem('userName');
      const mobnumber = sessionStorage.getItem('userMobileNumber') || '9941256207';

      if ($('#P1_NAME_OF_THE_INDENTING_OFFICER_DISPLAY').length) {
        $('#P1_NAME_OF_THE_INDENTING_OFFICER_DISPLAY').text(username);
      }
      if ($('#P1_NAME_OF_THE_INDENTING_OFFICER').length) {
        $('#P1_NAME_OF_THE_INDENTING_OFFICER').val(username);
      }
      if ($('#P1_DISTRICT_DISPLAY').length) {
        $('#P1_DISTRICT_DISPLAY').text(district);
      }
      if ($('#P1_DISTRICT').length) {
        $('#P1_DISTRICT').val(district);
      }

      function fetchAndPopulateDropdown({ payload, dropdownId, placeholder }) {
        $.ajax({
          url: apiUrl,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(payload)
          },
          dataType: 'json',
          success(response) {
            const decrypted = decryptData(response.data);
            const $dropdown = $(`#${dropdownId}`);
            $dropdown.empty().append(`<option value="">${placeholder}</option>`);

            decrypted.forEach(item => {
              const value = item.district || item.d || item.quarter || item.year;
              $dropdown.append(`<option value="${value}">${value}</option>`);
            });
          },
          error(xhr, status, error) {
            console.error(`${payload.function_name} API Error:`, error);
          }
        });
      }

      // Populate dropdowns
      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "get_factory_districts_fn",
          params: {}
        },
        dropdownId: "P40_DISTRICT",
        placeholder: "--Select District--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_quarter_fn",
          params: {}
        },
        dropdownId: "P40_QUARTERS",
        placeholder: "--Select Quarter--"
      });

      fetchAndPopulateDropdown({
        payload: {
          action: "function_call",
          function_name: "im_year_fn",
          params: {}
        },
        dropdownId: "P40_FINANCIAL_YEAR",
        placeholder: "--Select Financial Year--"
      });

      // Function to calculate summary statistics
      function calculateSummaryStats(data) {
        const districts = new Set();
        const medicines = new Set();
        let totalQty = 0;
        let totalAmt = 0;

        data.forEach(item => {
          if (item.name_of_the_district) districts.add(item.name_of_the_district);
          if (item.medicine_name) medicines.add(item.medicine_name);
          totalQty += parseFloat(item.quantity) || 0;
          totalAmt += parseFloat(item.amount) || 0;
        });

        return {
          totalDistricts: districts.size,
          totalMedicines: medicines.size,
          totalQuantity: totalQty.toFixed(2),
          totalAmount: totalAmt.toFixed(2)
        };
      }

      // Function to update summary stats display
      function updateSummaryStats(data) {
        if (!data || data.length === 0) {
          $('#summaryStats').removeClass('visible');
          return;
        }

        const stats = calculateSummaryStats(data);
        $('#totalDistricts').text(stats.totalDistricts);
        $('#totalMedicines').text(stats.totalMedicines);
        $('#totalQuantity').text(stats.totalQuantity);
        $('#totalAmount').text('₹ ' + stats.totalAmount);
        $('#summaryStats').addClass('visible');
      }

      // Function to download data as Excel
      function downloadAsExcel(data, filename) {
        // Prepare data for Excel with proper headers
        const excelData = data.map(item => ({
          'District': item.name_of_the_district || '',
          'Medicine Name': item.medicine_name || '',
          'Packing Size': item.packing_size || '',
          'Quantity': item.quantity || '',
          'Amount (₹)': item.amount || '',
          'Total Quantity': item.total_quantity || ''
        }));

        // Create worksheet
        const ws = XLSX.utils.json_to_sheet(excelData);

        // Set column widths
        const colWidths = [
          { wch: 20 }, // District
          { wch: 35 }, // Medicine Name
          { wch: 15 }, // Packing Size
          { wch: 12 }, // Quantity
          { wch: 15 }, // Amount
          { wch: 15 }  // Total Quantity
        ];
        ws['!cols'] = colWidths;

        // Create workbook
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Medicine Details");

        // Add metadata
        wb.Props = {
          Title: "Medicine Indent Report",
          Subject: "Regular Medicine Details",
          Author: "Department of Indian Medicine and Homoeopathy",
          CreatedDate: new Date()
        };

        // Generate filename with date if not provided
        if (!filename) {
          const date = new Date();
          const dateStr = date.toISOString().split('T')[0];
          const financialYear = $('#P40_FINANCIAL_YEAR').val().replace(/\s+/g, '_') || 'All';
          const quarter = $('#P40_QUARTERS').val().replace(/\s+/g, '_') || 'All';
          filename = `Medicine_Indent_Regular_${financialYear}_${quarter}_${dateStr}.xlsx`;
        }

        // Save file
        XLSX.writeFile(wb, filename);
      }

      function getParsedResponse(response) {
        try {
          return response && response.data ? decryptData(response.data) : response;
        } catch (e) {
          console.error('Failed to decrypt response data:', e);
          return response;
        }
      }

      function getPayloadWithLimitOffset(basePayload, limit, offset) {
        return {
          ...basePayload,
          limit: Math.max(1, parseInt(limit, 10) || 1000),
          offset: Math.max(0, parseInt(offset, 10) || 0)
        };
      }

      function fetchPageData(basePayload, limit, offset) {
        const requestPayload = getPayloadWithLimitOffset(basePayload, limit, offset);
        return $.ajax({
          url: apiUrlWithLimitOffset,
          method: 'POST',
          headers: {
            'X-APP-Key': 'edm',
            'X-APP-Name': 'edm'
          },
          data: {
            data: encryptData(requestPayload)
          },
          dataType: 'json'
        });
      }

      async function fetchTableData() {
        const basePayload = {
          action: "function_call",
          function_name: "im_get_medicine_detail_fn",
          params: {
            p_district: $('#P40_DISTRICT').val() || null,
            p_financial_year: $('#P40_FINANCIAL_YEAR').val() || '',
            p_quarters: $('#P40_QUARTERS').val() || ''
          }
        };

        // Save payload/count so download can export all pages
        lastBasePayload = basePayload;
        lastTotalCount = 0;

        // Show loading state
        $('#pivotContainer').html('<div class="text-center p-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2">Loading data...</p></div>');

        try {
          // Clear previous DataTable if exists
          if (dataTableRef) {
            dataTableRef.destroy();
          }
          currentData = [];

          // Define columns for DataTable
          const columns = [
            { title: "District", data: "name_of_the_district" },
            { title: "Medicine Name", data: "medicine_name" },
            { title: "Packing Size", data: "packing_size" },
            {
              title: "Quantity",
              data: "quantity",
              render: function (data) {
                return parseFloat(data).toLocaleString();
              }
            },
            {
              title: "Amount (₹)",
              data: "amount",
              render: function (data) {
                return '₹ ' + parseFloat(data).toLocaleString();
              }
            },
            {
              title: "Total Quantity",
              data: "total_quantity",
              render: function (data) {
                return parseFloat(data).toLocaleString();
              }
            }
          ];

          // Create DataTable
          const tableHtml = `
              <table id="medicineDataTable" class="display table table-striped table-bordered" style="width:100%">
                <thead>
                  <tr>
                    ${columns.map(col => `<th>${col.title}</th>`).join('')}
                  </tr>
                </thead>
              </table>
            `;

          dataTableRef = $('#pivotContainer').html(tableHtml).find('#medicineDataTable').DataTable({
            columns: columns,
            pageLength: 10,
            lengthMenu: [[10, 25, 50, 100], [10, 25, 50, 100]],
            searching: false,
            paging: true,
            ordering: true,
            info: true,
            responsive: true,
            scrollX: true,
            processing: true,
            serverSide: true,
            ajax: async function (data, callback) {
              const limit = data.length || 10;
              const offset = data.start || 0;

              try {
                const response = await fetchPageData(basePayload, limit, offset);
                const parsedResponse = getParsedResponse(response);
                const pageData = Array.isArray(parsedResponse)
                  ? parsedResponse
                  : (Array.isArray(parsedResponse?.data) ? parsedResponse.data : []);

                const responseMessage = parsedResponse?.message || response?.message || 'No data found for the selected criteria';
                const successFlag = parsedResponse?.success ?? response?.success;
                const totalCount = Number(parsedResponse?.pagination?.total ?? response?.pagination?.total ?? 0);
                lastTotalCount = totalCount;
                const isNoDataResponse = Number(successFlag) === 0 &&
                  (
                    Number(totalCount) === 0 ||
                    String(responseMessage).toLowerCase().includes('not found')
                  );

                if (isNoDataResponse) {
                  $('#downloadExcelBtn').hide();
                  $('#summaryStats').removeClass('visible');
                  currentData = [];
                  callback({
                    draw: data.draw,
                    recordsTotal: 0,
                    recordsFiltered: 0,
                    data: []
                  });
                  return;
                }

                // Keep only current page data to avoid loading huge dataset in browser
                currentData = pageData;
                if (pageData.length > 0) {
                  $('#downloadExcelBtn').show();
                  updateSummaryStats(pageData);
                } else {
                  $('#downloadExcelBtn').hide();
                  $('#summaryStats').removeClass('visible');
                }

                callback({
                  draw: data.draw,
                  recordsTotal: totalCount || pageData.length,
                  recordsFiltered: totalCount || pageData.length,
                  data: pageData
                });
              } catch (xhr) {
                console.error(`${basePayload.function_name} API Error:`, xhr);
                $('#downloadExcelBtn').hide();
                $('#summaryStats').removeClass('visible');
                callback({
                  draw: data.draw,
                  recordsTotal: 0,
                  recordsFiltered: 0,
                  data: []
                });
              }
            },
            language: {
              paginate: {
                previous: '<i class="bi bi-chevron-left"></i> Previous',
                next: 'Next <i class="bi bi-chevron-right"></i>'
              },
              search: "Search:",
              searchPlaceholder: "Type to search...",
              emptyTable: "No data available",
              info: "Showing _START_ to _END_ of _TOTAL_ entries",
              infoEmpty: "Showing 0 to 0 of 0 entries",
              infoFiltered: "(filtered from _MAX_ total entries)"
            },
            dom: '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"f>>' +
              '<"row"<"col-sm-12"tr>>' +
              '<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>',
            initComplete: function () {
              $('div.dataTables_filter input').addClass('form-control').attr('placeholder', 'Search...');
              $('div.dataTables_length select').addClass('form-control');
            }
          });
        } catch (xhr) {
          console.error(`${basePayload.function_name} API Error:`, xhr);
          $('#pivotContainer').html('<div class="alert alert-danger text-center p-4"><i class="bi bi-exclamation-triangle me-2"></i>Error loading data. Please try again.</div>');
          $('#downloadExcelBtn').hide();
          $('#summaryStats').removeClass('visible');
        }
      }

      $('#searchBtn').on('click', function () {
        const financialYear = $('#P40_FINANCIAL_YEAR').val();
        const quarters = $('#P40_QUARTERS').val();

        if (!financialYear || !quarters) {
          if (typeof showErrorToast === 'function') {
            showErrorToast("Please select both Financial Year and Quarters.");
          } else {
            alert("Please select both Financial Year and Quarters.");
          }
          return;
        }
        fetchTableData();
      });

      $('#clearBtn').on('click', function () {
        $('#P40_DISTRICT').val('');
        $('#P40_FINANCIAL_YEAR').val('');
        $('#P40_QUARTERS').val('');

        // Clear DataTable
        if (dataTableRef) {
          dataTableRef.destroy();
          $('#pivotContainer').empty();
        }

        // Hide download button and summary stats
        $('#downloadExcelBtn').hide();
        $('#summaryStats').removeClass('visible');

        // Clear stored data
        currentData = null;
      });

      // Download button click handler
      $(document).on('click', '#downloadExcelBtn', async function () {
        if (!currentData || currentData.length === 0) {
          if (typeof showErrorToast === 'function') {
            showErrorToast("No data available to download.");
          } else {
            alert("No data available to download.");
          }
          return;
        }

        // Download all pages if backend is returning only the first page
        let dataToDownload = currentData;
        try {
          const totalCount = Number(lastTotalCount) || 0;
          if (lastBasePayload && totalCount > 0 && totalCount > currentData.length) {
            const allData = [];
            const limit = 1000;

            // prevent double-click while downloading
            $('#downloadExcelBtn').prop('disabled', true).hide();

            for (let offset = 0; offset < totalCount; offset += limit) {
              const pageResp = await fetchPageData(lastBasePayload, limit, offset);
              const parsedPage = getParsedResponse(pageResp);
              const pageData = Array.isArray(parsedPage)
                ? parsedPage
                : (Array.isArray(parsedPage?.data) ? parsedPage.data : []);

              if (!pageData || pageData.length === 0) break;
              allData.push(...pageData);
            }

            if (allData.length > 0) {
              dataToDownload = allData;
            }
          }
        } catch (e) {
          console.error('Failed to download all pages:', e);
          dataToDownload = currentData;
        } finally {
          $('#downloadExcelBtn').prop('disabled', false).show();
        }

        // Download the data
        downloadAsExcel(dataToDownload);

        // Show success message
        if (typeof showSuccessToast === 'function') {
          showSuccessToast("Report downloaded successfully!");
        }
      });
    });
  </script>
</body>

</html>
